<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #4a0000 0%, #b71c1c 100%);
        font-family: 'Inter', sans-serif;
        color: #333;
      }
    </style>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:monospace;width:100%;';
        errDiv.innerHTML = '<h1>Global Error</h1><p>' + message + '</p><p>Source: ' + source + ':' + lineno + ':' + colno + '</p><pre>' + (error && error.stack ? error.stack : '') + '</pre>';
        document.body.appendChild(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;z-index:9999;background:orange;color:black;padding:20px;font-family:monospace;width:100%;';
        errDiv.innerHTML = '<h1>Unhandled Promise Rejection</h1><pre>' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
